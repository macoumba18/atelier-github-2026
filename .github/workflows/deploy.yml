name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: elhadji10/springboot-app
  CONTAINER_NAME: springboot-app
  APP_PORT: 8080

jobs:
  test:
    name: Tests Maven
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests
        run: mvn test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb generic main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version
      
      - name: Scan Docker image
        run: |
          trivy image ${{ env.DOCKER_IMAGE }}:latest --severity HIGH,CRITICAL --exit-code 0 || true
      
      - name: Generate report
        if: always()
        run: |
          trivy image ${{ env.DOCKER_IMAGE }}:latest --format json --output trivy-report.json || true
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  deploy-staging:
    name: Déploiement Staging
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://192.168.1.8:8081
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Deploy to Staging
        run: |
          echo "🔄 Déploiement sur l'environnement STAGING..."
          docker stop springboot-app-staging || true
          docker rm springboot-app-staging || true
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          docker run -d \
            --name springboot-app-staging \
            --restart unless-stopped \
            -p 8081:8080 \
            -e SPRING_PROFILES_ACTIVE=staging \
            ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Staging déployé sur http://192.168.1.8:8081"

  deploy-production:
    name: Déploiement Production
    runs-on: self-hosted
    needs: [build-and-push, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://192.168.1.8:8080
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Deploy to Production
        run: |
          echo "🚀 Déploiement sur l'environnement PRODUCTION..."
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Production déployée sur http://192.168.1.8:8080"

  rollback:
    name: Rollback automatique
    runs-on: self-hosted
    needs: [deploy-production]
    if: failure()
    
    steps:
      - name: Rollback to previous version
        run: |
          echo "⚠️ ÉCHEC DU DÉPLOIEMENT ! Rollback en cours..."
          PREVIOUS_TAG=$(docker images ${{ env.DOCKER_IMAGE }} --format "{{.Tag}}" | grep -v latest | head -2 | tail -1)
          if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "null" ]; then
            echo "🔄 Rollback vers $PREVIOUS_TAG"
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ env.DOCKER_IMAGE }}:$PREVIOUS_TAG
            echo "✅ Rollback réussi vers $PREVIOUS_TAG"
          else
            echo "❌ Aucune version précédente trouvée"
            exit 1
          fi

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [test, build-and-push, security-scan, deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Check status
        id: status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build-and-push.result }}" == "success" ] && \
             [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Success message
        if: steps.status.outputs.status == 'success'
        run: |
          echo "✅ Pipeline CI/CD réussi !"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🔗 Production: http://192.168.1.8:8080"
          echo "🔗 Staging: http://192.168.1.8:8081"
      
      - name: Failure message
        if: steps.status.outputs.status == 'failure'
        run: |
          echo "❌ Pipeline CI/CD échoué !"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build-and-push.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"